components:
  parameters:
    VaultId:
      explode: false
      in: path
      name: vault_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    SecretPath:
      description: Secret path (e.g. "db/credentials")
      explode: false
      in: path
      name: path
      required: true
      schema:
        type: string
      style: simple
    AgentId:
      explode: false
      in: path
      name: agent_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    PolicyId:
      explode: false
      in: path
      name: policy_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    IncludeSignedTx:
      description: |
        Set to `true` or `1` to include the raw signed transaction hex in the response. Omitted by default to reduce key exfiltration risk. Only the literal values "true" or "1" enable inclusion; any other value or omission returns responses without signed_tx. Applies to GET /v1/agents/{agent_id}/transactions and GET /v1/agents/{agent_id}/transactions/{tx_id}.
      explode: true
      in: query
      name: include_signed_tx
      required: false
      schema:
        default: false
        example: false
        type: boolean
      style: form
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: Invalid request
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: Authentication required or invalid
    Forbidden:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: Insufficient permissions
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
      description: Resource not found
    PaymentRequired:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PaymentRequirement"
      description: x402 payment required
  schemas:
    ProblemDetails:
      description: RFC 7807 error envelope
      example:
        detail: detail
        type: type
        title: title
        status: 6
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
    ResetUsageEventsResponse:
      example:
        deleted_events: 0
      properties:
        deleted_events:
          description: Number of usage_events rows removed
          format: int64
          type: integer
      required:
      - deleted_events
    ResetUsageForUserEmailRequest:
      example:
        email: email
      properties:
        email:
          format: email
          type: string
      required:
      - email
    ResetUsageForUserEmailResponse:
      example:
        user_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        org_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        deleted_events: 0
        display_name: display_name
        email: email
      properties:
        deleted_events:
          format: int64
          type: integer
        org_id:
          format: uuid
          type: string
        user_id:
          format: uuid
          type: string
        email:
          type: string
        display_name:
          type: string
      required:
      - deleted_events
      - display_name
      - email
      - org_id
      - user_id
    LoginRequest:
      example:
        password: password
        email: email
      properties:
        email:
          format: email
          type: string
        password:
          format: password
          type: string
      required:
      - email
      - password
    LoginResponse:
      example:
        access_token: access_token
        refresh_token: refresh_token
        mfa_token: mfa_token
        mfa_required: true
        token_type: token_type
        expires_in: 0
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
        mfa_required:
          type: boolean
        mfa_token:
          type: string
    TokenResponse:
      example:
        access_token: access_token
        refresh_token: refresh_token
        token_type: token_type
        expires_in: 0
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
      required:
      - access_token
