    get:
      operationId: listTransactions
      parameters:
      - $ref: "#/components/parameters/AgentId"
      - $ref: "#/components/parameters/IncludeSignedTx"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
          description: Transaction list
      summary: List agent transactions
      tags:
      - Transactions
    post:
      description: |
        Replay protection: send an optional **Idempotency-Key** header (e.g. UUID or opaque string).
        Duplicate requests with the same key within 24 hours return the cached transaction response
        (no second sign/broadcast). Omit the header for non-idempotent submissions.
      operationId: submitTransaction
      parameters:
      - $ref: "#/components/parameters/AgentId"
      - description: Optional key for replay protection; duplicate requests return
          cached response.
        explode: false
        in: header
        name: Idempotency-Key
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTransactionRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
          description: Transaction signed (and optionally broadcast)
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
          description: Transaction previously created with same Idempotency-Key (replay-safe
            response)
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Idempotency-Key in use by another in-flight request; retry
            later.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
          description: Simulation reverted (when simulate_first is true)
      summary: Submit a transaction for signing
      tags:
      - Transactions
      x-agentcash-auth:
        mode: paid
      x-payment-info:
        protocols:
        - x402
        pricingMode: quote
  /v1/agents/{agent_id}/transactions/{tx_id}:
