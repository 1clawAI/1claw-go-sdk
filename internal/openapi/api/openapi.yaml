openapi: 3.1.0
info:
  contact:
    email: ops@1claw.xyz
  description: |
    Secure secret management for AI agents. Provides vaults, secrets,
    policy-based access control, agent identity, Intents API,
    sharing, billing, and audit logging.

    All endpoints require JWT Bearer authentication unless marked with
    `security: []`.
  title: 1Claw API
  version: 2.6.0
servers:
- description: Development
  url: http://localhost:8443
- description: Production
  url: https://api.1claw.xyz
- description: Shroud TEE Proxy (Intents API + LLM proxy)
  url: https://shroud.1claw.xyz
security:
- BearerAuth: []
tags:
- description: "Credential exchange, MFA, device auth, token management"
  name: Authentication
- description: Personal API key management
  name: API Keys
- description: Vault lifecycle operations
  name: Vaults
- description: Secret CRUD within vaults
  name: Secrets
- description: Access policy management
  name: Policies
- description: Agent identity and key management
  name: Agents
- description: "Intents API (signing, simulation)"
  name: Transactions
- description: Blockchain chain registry
  name: Chains
- description: Secret sharing links
  name: Sharing
- description: Org membership and roles
  name: Organization
- description: "Subscriptions, credits, and usage"
  name: Billing
- description: Immutable audit event log
  name: Audit
- description: IP rules and security configuration
  name: Security
- description: Multi-sig treasury wallets (Safe) and agent access requests
  name: Treasury
- description: Platform administration
  name: Admin
- description: Service health checks
  name: Health
paths:
  /v1/auth/token:
    delete:
      operationId: revokeToken
      responses:
        "204":
          description: Token revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
      summary: Revoke current token
      tags:
      - Authentication
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          description: Authenticated (or MFA required)
        "401":
          $ref: "#/components/responses/Unauthorized"
      security: []
      summary: Login with email and password
      tags:
      - Authentication
  /v1/auth/agent-token:
    post:
      operationId: agentToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          description: Agent JWT issued
        "401":
          $ref: "#/components/responses/Unauthorized"
      security: []
      summary: Exchange agent credentials for JWT
      tags:
      - Authentication
  /v1/auth/api-key-token:
    post:
      operationId: apiKeyToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserApiKeyTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          description: JWT issued
        "401":
          $ref: "#/components/responses/Unauthorized"
      security: []
      summary: Exchange user API key for JWT
      tags:
      - Authentication
  /v1/auth/refresh:
    post:
      operationId: refreshToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/refreshToken_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          description: Token refreshed
        "401":
          $ref: "#/components/responses/Unauthorized"
      security: []
      summary: Refresh an expiring JWT
      tags:
      - Authentication
  /v1/auth/jwt-public-key:
    get:
      description: |
        Returns the Ed25519 public key used to sign JWTs.
        Use this to verify tokens independently (e.g. in a TEE proxy or
        gateway). No authentication required.
      operationId: getJwtPublicKey
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getJwtPublicKey_200_response"
          description: JWT public key
      security: []
      summary: Get JWT verification public key
      tags:
      - Authentication
  /v1/auth/signup:
    post:
      operationId: signup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
          description: Account created (pending verification or auto-login)
        "400":
          $ref: "#/components/responses/BadRequest"
      security: []
      summary: Create a new account
      tags:
      - Authentication
  /v1/auth/verify-email:
    post:
      operationId: verifyEmail
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/verifyEmail_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          description: Email verified
        "400":
          $ref: "#/components/responses/BadRequest"
      security: []
      summary: Verify email address
      tags:
      - Authentication
  /v1/auth/forgot-password:
    post:
      description: |
        Always returns the same message whether or not the email exists (no account enumeration).
        Only password-based accounts receive mail.
      operationId: forgotPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
          description: Acknowledgement (check email if account exists)
      security: []
      summary: Request password reset email
      tags:
      - Authentication
  /v1/auth/reset-password:
    post:
      operationId: resetPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResponse"
          description: Password updated
        "400":
          $ref: "#/components/responses/BadRequest"
      security: []
      summary: Set a new password using reset token from email
      tags:
      - Authentication
  /v1/auth/google:
    post:
      operationId: googleAuth
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleAuthRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          description: Authenticated
        "401":
          $ref: "#/components/responses/Unauthorized"
      security: []
      summary: Authenticate with Google OAuth
      tags:
      - Authentication
  /v1/auth/change-password:
    post:
      operationId: changePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
        required: true
      responses:
        "204":
          description: Password changed
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Change current user's password
      tags:
      - Authentication
  /v1/auth/me:
    delete:
      operationId: deleteMe
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/deleteMe_request"
        required: true
      responses:
        "204":
          description: Account deleted
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Delete current user account
      tags:
      - Authentication
    get:
      operationId: getMe
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
          description: User profile
      summary: Get current user profile
      tags:
      - Authentication
    patch:
      operationId: updateMe
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
          description: Profile updated
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Update user profile
      tags:
      - Authentication
  /v1/auth/mfa/status:
    get:
      operationId: mfaStatus
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaStatusResponse"
          description: MFA status
      summary: Check MFA enrollment status
      tags:
      - Authentication
  /v1/auth/mfa/setup:
    post:
      operationId: mfaSetup
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSetupResponse"
          description: TOTP setup details
      summary: Begin MFA enrollment
      tags:
      - Authentication
  /v1/auth/mfa/verify-setup:
    post:
      operationId: mfaVerifySetup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifySetupRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaVerifySetupResponse"
          description: "MFA enabled, recovery codes returned"
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Confirm MFA enrollment with a TOTP code
      tags:
      - Authentication
  /v1/auth/mfa/verify:
    post:
      operationId: mfaVerify
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          description: "MFA verified, JWT issued"
        "401":
          $ref: "#/components/responses/Unauthorized"
      security: []
      summary: Verify MFA code during login
      tags:
      - Authentication
  /v1/auth/mfa:
    delete:
      operationId: mfaDisable
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaDisableRequest"
        required: true
      responses:
        "204":
          description: MFA disabled
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Disable MFA
      tags:
      - Authentication
  /v1/auth/device/code:
    post:
      operationId: deviceCode
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceCodeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCodeResponse"
          description: Device code issued
      security: []
      summary: Request a device authorization code
      tags:
      - Authentication
  /v1/auth/device/token:
    post:
      operationId: deviceToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceTokenResponse"
          description: Token issued or authorization pending
      security: []
      summary: Poll for device authorization token
      tags:
      - Authentication
  /v1/auth/device/code/{user_code}:
    get:
      operationId: deviceCodeStatus
      parameters:
      - explode: false
        in: path
        name: user_code
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Device code details
        "404":
          $ref: "#/components/responses/NotFound"
      security: []
      summary: Check device code status
      tags:
      - Authentication
  /v1/auth/device/approve:
    post:
      operationId: deviceApprove
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceApproveRequest"
        required: true
      responses:
        "200":
          description: Device approved
      summary: Approve a CLI device login
      tags:
      - Authentication
  /v1/auth/device/deny:
    post:
      operationId: deviceDeny
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceApproveRequest"
        required: true
      responses:
        "200":
          description: Device denied
      summary: Deny a CLI device login
      tags:
      - Authentication
  /v1/auth/api-keys:
    get:
      operationId: listApiKeys
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"
          description: List of API keys (masked)
      summary: List personal API keys
      tags:
      - API Keys
    post:
      operationId: createApiKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreatedResponse"
          description: API key created (full key shown once)
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Create a personal API key
      tags:
      - API Keys
  /v1/auth/api-keys/{key_id}:
    delete:
      operationId: revokeApiKey
      parameters:
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Key revoked
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Revoke an API key
      tags:
      - API Keys
  /v1/vaults:
    get:
      operationId: listVaults
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultListResponse"
          description: List of vaults
      summary: List vaults
      tags:
      - Vaults
    post:
      operationId: createVault
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVaultRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResponse"
          description: Vault created
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Create a vault
      tags:
      - Vaults
  /v1/vaults/{vault_id}:
    delete:
      operationId: deleteVault
      parameters:
      - $ref: "#/components/parameters/VaultId"
      responses:
        "204":
          description: Vault deleted
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Delete a vault
      tags:
      - Vaults
    get:
      operationId: getVault
      parameters:
      - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResponse"
          description: Vault details
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Get vault details
      tags:
      - Vaults
  /v1/vaults/{vault_id}/cmek:
    delete:
      description: |
        Disable client-side encryption. Existing CMEK-encrypted secrets still require
        the key to decrypt. New secrets will use HSM-only encryption.
      operationId: disableCmek
      parameters:
      - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResponse"
          description: CMEK disabled
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Disable CMEK on a vault
      tags:
      - CMEK
    post:
      description: |
        Enable client-side encryption on a vault. Requires Business or Enterprise plan.
        Only the key's SHA-256 fingerprint is stored — the key never touches the server.
      operationId: enableCmek
      parameters:
      - $ref: "#/components/parameters/VaultId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnableCmekRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResponse"
          description: CMEK enabled
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
      summary: Enable CMEK on a vault
      tags:
      - CMEK
  /v1/vaults/{vault_id}/cmek-rotate:
    post:
      description: |
        Re-encrypts all secrets from the old CMEK key to the new one.
        Keys are passed in headers (TLS-only) and exist in server memory
        only during the rotation. Batched in groups of 100 secrets.
      operationId: rotateCmek
      parameters:
      - $ref: "#/components/parameters/VaultId"
      - description: Base64-encoded old CMEK key (32 bytes)
        explode: false
        in: header
        name: x-cmek-old-key
        required: true
        schema:
          type: string
        style: simple
      - description: Base64-encoded new CMEK key (32 bytes)
        explode: false
        in: header
        name: x-cmek-new-key
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmekRotateRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmekRotationJobResponse"
          description: Rotation job started
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Start server-assisted CMEK key rotation
      tags:
      - CMEK
  /v1/vaults/{vault_id}/cmek-rotate/{job_id}:
    get:
      operationId: getCmekRotationJob
      parameters:
      - $ref: "#/components/parameters/VaultId"
      - explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmekRotationJobResponse"
          description: Rotation job status
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Get CMEK rotation job status
      tags:
      - CMEK
  /v1/vaults/{vault_id}/secrets:
    get:
      operationId: listSecrets
      parameters:
      - $ref: "#/components/parameters/VaultId"
      - description: Filter by path prefix
        explode: true
        in: query
        name: prefix
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretListResponse"
          description: Secret metadata list
        "404":
          $ref: "#/components/responses/NotFound"
      summary: List secrets in a vault
      tags:
      - Secrets
  /v1/vaults/{vault_id}/secrets/{path}:
    delete:
      operationId: deleteSecret
      parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/SecretPath"
      responses:
        "204":
          description: Secret deleted
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Delete a secret
      tags:
      - Secrets
    get:
      operationId: getSecret
      parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/SecretPath"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretResponse"
          description: Decrypted secret value
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Retrieve a decrypted secret
      tags:
      - Secrets
      x-agentcash-auth:
        mode: paid
      x-payment-info:
        protocols:
        - x402
        pricingMode: fixed
        price: "0.0015"
    put:
      operationId: putSecret
      parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/SecretPath"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutSecretRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretMetadataResponse"
          description: Secret created or updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          $ref: "#/components/responses/PaymentRequired"
      summary: Store or update a secret
      tags:
      - Secrets
      x-agentcash-auth:
        mode: paid
      x-payment-info:
        protocols:
        - x402
        pricingMode: fixed
        price: "0.0075"
  /v1/vaults/{vault_id}/policies:
    get:
      operationId: listPolicies
      parameters:
      - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyListResponse"
          description: Policy list
      summary: List policies on a vault
      tags:
      - Policies
    post:
      operationId: createPolicy
      parameters:
      - $ref: "#/components/parameters/VaultId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
          description: Policy created
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Create an access policy
      tags:
      - Policies
  /v1/vaults/{vault_id}/policies/{policy_id}:
    delete:
      operationId: deletePolicy
      parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/PolicyId"
      responses:
        "204":
          description: Policy revoked
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Revoke a policy
      tags:
      - Policies
    put:
      operationId: updatePolicy
      parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/PolicyId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
          description: Policy updated
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Update a policy
      tags:
      - Policies
  /v1/agents/enroll:
    post:
      description: |
        Public endpoint (no auth required). Creates an agent under the human's org
        and emails the credentials to the specified human email. The API key is NOT
        returned in the response. Anti-spam: IP rate limiting + per-email cooldown.
      operationId: enrollAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollAgentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollAgentResponse"
          description: Enrollment processed (uniform response to prevent email enumeration)
        "429":
          description: Rate limit exceeded
      summary: Self-enroll an agent
      tags:
      - Agents
  /v1/agents:
    get:
      operationId: listAgents
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
          description: Agent list
      summary: List agents
      tags:
      - Agents
    post:
      operationId: createAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCreatedResponse"
          description: Agent created with one-time API key
        "400":
          $ref: "#/components/responses/BadRequest"
      summary: Register a new agent
      tags:
      - Agents
